{% raw  %}
<html>
    <head>
        <title>Fraction of days with any discharge by prior-48-hr rainfall</title>
        <script src='https://cdn.jsdelivr.net/npm/chart.js@2.8.0/dist/Chart.bundle.min.js'></script>
    </head>
    <body>
        <div style="width: 640px; height: 380px; max-width: 99%" class="chartjs">

            <canvas id="Fraction of days with any discharge by prior-48-hr rainfall" height="380" width="640"></canvas>
            <script>
                Chart.defaults.global.defaultFontSize = 12;
                var chart_data = {
                
                    data: {
                        labels: ['None (<0.05 in)', 'Light (0.05–0.25 in)', 'Moderate (0.25–0.75 in)', 'Heavy (0.75–1.5 in)', 'Very heavy (>1.5 in)'],
                        datasets: [{'data': [31.282952548330407, 40.98360655737705, 36.996336996337, 33.85826771653544, 27.77777777777778], 'label': 'CSO – Untreated', 'backgroundColor': 'rgba(31, 119, 180,0.75)', 'borderColor': 'rgba(31, 119, 180,1.0)', 'borderWidth': 1, 'yAxisID': 'y-axis-0', 'stack': 'discharge'},{'data': [0.5272407732864675, 0.0, 0.3663003663003663, 0.7874015748031495, 0.0], 'label': 'CSO – Treated', 'backgroundColor': 'rgba(255, 127, 14,0.75)', 'borderColor': 'rgba(255, 127, 14,1.0)', 'borderWidth': 1, 'yAxisID': 'y-axis-0', 'stack': 'discharge'},{'data': [1.4059753954305798, 1.9672131147540985, 2.197802197802198, 5.511811023622047, 5.555555555555555], 'label': 'Partially Treated', 'backgroundColor': 'rgba(44, 160, 44,0.75)', 'borderColor': 'rgba(44, 160, 44,1.0)', 'borderWidth': 1, 'yAxisID': 'y-axis-0', 'stack': 'discharge'},{'data': [1.2302284710017575, 1.3114754098360655, 2.197802197802198, 2.3622047244094486, 5.555555555555555], 'label': 'SSO', 'backgroundColor': 'rgba(214, 39, 40,0.75)', 'borderColor': 'rgba(214, 39, 40,1.0)', 'borderWidth': 1, 'yAxisID': 'y-axis-0', 'stack': 'discharge'},{'data': [569, 305, 273, 127, 36], 'label': 'Days in bin', 'type': 'line', 'yAxisID': 'y-axis-1', 'backgroundColor': 'rgba(148, 103, 189,0.15)', 'borderColor': 'rgba(148, 103, 189,0.7)', 'pointBackgroundColor': 'rgba(148, 103, 189,0.9)', 'pointRadius': 4, 'fill': false}]
                    },
                    type: 'bar',
                    options: {
                        scales: {
                            yAxes: [{
                                display: true,
                                scaleLabel: {
                                    display: true,
                                    labelString: 'Days with discharge reported (%)'
                                },
                                ticks: {
                                    beginAtZero: true, min: 0
                                },
                                "id": "y-axis-0",
                                "position": "left",
                                stacked: true
                            }, {
                                display: true,
                                scaleLabel: {
                                    display: true,
                                    labelString: 'Number of days in bin'
                                },
                                ticks: {
                                    beginAtZero: true, min: 0
                                },
                                "id": "y-axis-1",
                                "position": "right"
                            }],
                            xAxes: [{
                                scaleLabel: {
                                    display: true,
                                    labelString: 'Prior 48-hr precipitation (MA station avg)'
                                },
                                stacked: true,
                                ticks: {
                                    autoSkip: true
                                }
                            }]
                        },
                        legend: {
                            display: true
                            },
                        tooltips: {
                            display: true
                            }
                    },
                }
                
                
                

chart_data.options.tooltips = { callbacks: { label: function(item, data) { if (item.datasetIndex < 4) {  return data.datasets[item.datasetIndex].label + ": " + item.yLabel.toFixed(1) + "% of days"; } else {  return item.yLabel.toFixed(0) + " days in bin"; }} } };
            </script>
            <script>
                {{
                    var ctx = document.getElementById("Fraction of days with any discharge by prior-48-hr rainfall").getContext("2d");
                    var mychart = new Chart(ctx, chart_data);
                }}
            </script>

        </div>
    </body>
</html>
{% endraw  %}
