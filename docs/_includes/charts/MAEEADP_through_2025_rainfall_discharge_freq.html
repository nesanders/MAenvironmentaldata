{% raw  %}
<html>
    <head>
        <title>Fraction of days with any discharge by prior-48-hr rainfall</title>
        <script src='https://cdn.jsdelivr.net/npm/chart.js@2.8.0/dist/Chart.bundle.min.js'></script>
    </head>
    <body>
        <div style="width: 640px; height: 380px; max-width: 99%" class="chartjs">

            <canvas id="Fraction of days with any discharge by prior-48-hr rainfall" height="380" width="640"></canvas>
            <script>
                Chart.defaults.global.defaultFontSize = 12;
                var chart_data = {
                
                    data: {
                        labels: ['None (<0.05 in)', 'Light (0.05–0.25 in)', 'Moderate (0.25–0.75 in)', 'Heavy (0.75–1.5 in)', 'Very heavy (>1.5 in)'],
                        datasets: [{'data': [34.44639718804921, 44.26229508196721, 41.75824175824176, 42.51968503937008, 38.88888888888889], 'label': '% of days with any discharge', 'backgroundColor': 'rgba(31, 119, 180,0.7)', 'borderColor': 'rgba(31, 119, 180,1.0)', 'borderWidth': 1}]
                    },
                    type: 'bar',
                    options: {
                        scales: {
                            yAxes: [{
                                display: true,
                                scaleLabel: {
                                    display: true,
                                    labelString: 'Days with discharge reported (%)'
                                },
                                ticks: {
                                    
                                },
                                "id": "y-axis-0",
                                "position": "left",
                                stacked: false
                            }, {
                                display: false,
                                scaleLabel: {
                                    display: true,
                                    labelString: ''
                                },
                                ticks: {
                                    
                                },
                                "id": "y-axis-1",
                                "position": "right"
                            }],
                            xAxes: [{
                                scaleLabel: {
                                    display: true,
                                    labelString: 'Prior 48-hr precipitation (MA station avg)'
                                },
                                stacked: false,
                                ticks: {
                                    autoSkip: true
                                }
                            }]
                        },
                        legend: {
                            display: true
                            },
                        tooltips: {
                            display: true
                            }
                    },
                }
                
                
                

chart_data.options.tooltips = { callbacks: { label: function(item, data) { var pct = item.yLabel.toFixed(1); var counts = [569, 305, 273, 127, 36]; var n = counts[item.index]; return pct + '% of ' + n + ' days'; } } };
            </script>
            <script>
                {{
                    var ctx = document.getElementById("Fraction of days with any discharge by prior-48-hr rainfall").getContext("2d");
                    var mychart = new Chart(ctx, chart_data);
                }}
            </script>

        </div>
    </body>
</html>
{% endraw  %}
